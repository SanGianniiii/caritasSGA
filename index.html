<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caritas San Giovanni - Gestione Dispensa</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#27ae60">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>

    <div id="app">
        <div id="custom-alert" class="custom-alert" style="display:none;">
            <div class="alert-content">
                <div class="alert-icon">✅</div>
                <div id="alert-message"></div>
            </div>
        </div>

        <header>
            <img src="logo.png" alt="Caritas San Giovanni Apostolo" class="logo">
        </header>

        <div id="main-menu">
            <button onclick="showScanner()" class="btn-main">
                <span>📸</span> SCAN PRODOTTO
            </button>
            <button onclick="loadInventory()" class="btn-main secondary">
                <span>📦</span> VEDI GIACENZA
            </button>
        </div>

        <div id="scanner-container" style="display:none;">
            <div id="reader"></div>
            <div class="scanner-controls">
                <button onclick="hideScanner()" class="btn-back">❌ Annulla</button>
            </div>
        </div>

        <div id="inventory-container" style="display:none;">
            <div class="inventory-header">
                <button onclick="showMenu()" class="btn-back-small">⬅ Indietro</button>
                <h2>Giacenza Attuale</h2>
            </div>
            <ul id="inventory-list"></ul>
        </div>

        <div id="modal" class="modal" style="display:none;">
            <div class="modal-content">
                <h3 id="modal-title">Aggiungi Prodotto</h3>
                <div class="modal-info">
                    <strong id="prod-name">---</strong>
                    <small id="prod-barcode">---</small>
                </div>
                
                <input type="number" id="qty-input" inputmode="numeric" placeholder="Inserisci quantità" autofocus>
                
                <div class="modal-buttons">
                    <button id="btn-conferma-azione" class="btn-save">✅ Conferma</button>
                    <button onclick="closeModal()" class="btn-cancel">Annulla</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
