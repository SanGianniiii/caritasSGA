<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Master PWA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div id="app">
        <header>
            <img src="logo.png" alt="Logo" class="logo"> <h1>Stock Master</h1>
        </header>

        <div id="main-menu">
            <button onclick="showScanner()" class="btn-main">📸 SCAN PRODOTTO</button>
            <button onclick="loadInventory()" class="btn-main secondary">📦 VEDI GIACENZA</button>
        </div>

        <div id="scanner-container" style="display:none;">
            <div id="reader"></div>
            <button onclick="hideScanner()" class="btn-back">Annulla</button>
        </div>

        <div id="inventory-container" style="display:none;">
            <button onclick="showMenu()" class="btn-back">Indietro</button>
            <ul id="inventory-list"></ul>
        </div>

        <div id="modal" class="modal" style="display:none;">
            <div class="modal-content">
                <h3 id="prod-name">Prodotto...</h3>
                <p id="prod-barcode"></p>
                <input type="number" id="qty-input" placeholder="Quantità da aggiungere" value="1">
                <div class="modal-buttons">
                    <button onclick="saveStock()" class="btn-save">Salva</button>
                    <button onclick="closeModal()" class="btn-cancel">Chiudi</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
