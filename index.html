<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caritas Magazzino Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <div id="toast-container"></div>

    <div id="loading-overlay" style="display:none;">
        <div class="loader-box">
            <div class="spinner"></div>
            <p id="loading-text">Elaborazione in corso...</p>
        </div>
    </div>

    <div id="app">
        <header id="app-header">
            <h1>SERVIZIO CARITAS</h1>
            <p>SAN GIOVANNI APOSTOLO ED EVANGELISTA CATANIA</p>
        </header>

        <main id="main-menu" class="container">
            <button onclick="showScanner()" class="btn-hero btn-blue">
                <span class="btn-icon">📷</span>
                <span class="btn-text">SCANSIONA</span>
            </button>
            <button onclick="loadInventory()" class="btn-hero btn-white">
                <span class="btn-icon">📦</span>
                <span class="btn-text">GIACENZE</span>
            </button>
        </main>

       <div id="scanner-container" style="display:none;">
    <div id="reader"></div>
    <div class="scanner-ui">
        <button id="torch-button" onclick="toggleTorch()" class="btn-torch">
            🔦 Luci
        </button>
        <button onclick="hideScanner()" class="btn-danger-full">
            ANNULLA ED ESCI
        </button>
    </div>
</div>

        <div id="inventory-container" style="display:none;" class="full-view">
            <div class="sticky-header">
                <button onclick="goToHome()" class="btn-back">⬅ Menu</button>
                <select id="category-filter" onchange="renderInventory()"></select>
            </div>
            <div id="inventory-list-content">
                <ul id="inventory-list"></ul>
            </div>
        </div>

        <div id="modal-new-product" class="modal" style="display:none;">
            <div class="modal-body">
                <h2>Nuovo Prodotto</h2>
                <div class="input-group">
                    <label>Nome Prodotto</label>
                    <input type="text" id="new-prod-name" placeholder="Inserisci nome...">
                </div>
                <div class="input-group">
                    <label>Categoria</label>
                    <select id="new-prod-category" onchange="checkNewCategory(this)"></select>
                </div>
                <div class="action-row">
                    <button onclick="saveNewProductAnagrafica()" class="btn-confirm">AVANTI</button>
                    <button onclick="closeAndReturn()" class="btn-cancel">ANNULLA</button>
                </div>
            </div>
        </div>

        <div id="modal-qty" class="modal" style="display:none;">
            <div class="modal-body">
                <h2 id="modal-title">Operazione</h2>
                <div class="prod-badge" id="prod-category-badge"></div>
                <h3 id="prod-name-display"></h3>
                <div class="qty-selector">
                    <button onclick="changeQty(-1)" class="btn-circle">-</button>
                    <input type="number" id="qty-input" inputmode="numeric">
                    <button onclick="changeQty(1)" class="btn-circle">+</button>
                </div>
                <div class="action-row">
                    <button id="btn-conferma-azione" class="btn-confirm">CONFERMA</button>
                    <button onclick="closeAndReturn()" class="btn-cancel">CHIUDI</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log('Service Worker Registrato');
            });
        }
    </script>
</body>
</html>
