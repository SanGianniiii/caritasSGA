<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caritas Dispensa</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
</head>
<body>

    <div id="app">
        <div id="loading-overlay" class="loading-overlay" style="display:none;">
            <div class="spinner"></div>
            <p>Elaborazione...</p>
        </div>

        <div id="custom-alert" class="custom-alert" style="display:none;">
            <div class="alert-content">
                <div class="alert-icon" id="alert-icon-type">✅</div>
                <div id="alert-message"></div>
            </div>
        </div>

        <header id="main-header">
            <h1 class="app-title">Caritas San Giovanni</h1>
            <p class="app-subtitle">Gestione Dispensa</p>
        </header>

        <div id="main-menu" class="container">
            <button onclick="showScanner()" class="btn-main btn-scan">
                <span class="icon">📷</span> ACQUISISCI PRODOTTO
            </button>
            <button onclick="loadInventory()" class="btn-main btn-inventory">
                <span class="icon">📦</span> CONSULTA GIACENZE
            </button>
        </div>

        <div id="scanner-container" style="display:none;">
            <div class="scanner-header">Inquadra il Codice a Barre</div>
            <div id="reader"></div>
            <button onclick="hideScanner()" class="btn-cancel-scan">❌ ANNULLA E CHIUDI</button>
        </div>

        <div id="inventory-container" style="display:none;" class="container">
            <div class="inventory-controls">
                <button onclick="showMenu()" class="btn-outline">⬅ Torna al Menu</button>
                <div class="filter-group">
                    <label for="category-filter">Filtra per Categoria:</label>
                    <select id="category-filter" onchange="renderInventory()">
                        <option value="ALL">Tutte le categorie</option>
                        </select>
                </div>
            </div>
            <div class="stats-bar">Totale prodotti visualizzati: <b id="total-items">0</b></div>
            <ul id="inventory-list"></ul>
        </div>

        <div id="modal-new-product" class="modal" style="display:none;">
            <div class="modal-content">
                <h3>Prodotto Sconosciuto</h3>
                <p class="text-muted">Registra questo prodotto nel sistema.</p>
                
                <div class="form-group">
                    <label>Nome Prodotto (es. Penne Rigate 1kg)</label>
                    <input type="text" id="new-prod-name" placeholder="Inserisci nome...">
                </div>
                
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="new-prod-category" onchange="checkNewCategory(this)">
                        <option value="" disabled selected>Seleziona una categoria...</option>
                        <option value="NEW">➕ Aggiungi nuova categoria...</option>
                    </select>
                </div>

                <div class="modal-buttons">
                    <button onclick="saveNewProductAnagrafica()" class="btn-save">Avanti ➡</button>
                    <button onclick="closeModals()" class="btn-text">Annulla</button>
                </div>
            </div>
        </div>

        <div id="modal-qty" class="modal" style="display:none;">
            <div class="modal-content">
                <h3 id="modal-title">Operazione</h3>
                <div class="modal-info">
                    <span class="badge" id="prod-category-badge">Categoria</span>
                    <strong id="prod-name-display" class="product-title">---</strong>
                </div>
                
                <div class="qty-control">
                    <button onclick="changeQty(-1)" class="btn-qty">-</button>
                    <input type="number" id="qty-input" inputmode="numeric" value="1" min="1">
                    <button onclick="changeQty(1)" class="btn-qty">+</button>
                </div>

                <div class="modal-buttons">
                    <button id="btn-conferma-azione" class="btn-save">✅ Conferma</button>
                    <button onclick="closeModals()" class="btn-text">Annulla</button>
                </div>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
